<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DrMax — Lékárna Hra</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #1a1a1a;
        min-height: 100vh;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: #fff;
        overflow: hidden;
      }
      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      #game {
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border-radius: 8px;
        overflow: hidden;
      }
      #footer {
        margin-top: 12px;
        font-size: 12px;
        color: #777;
        letter-spacing: 0.5px;
      }
      #footer a { color: #aaa; text-decoration: none; }
      #footer a:hover { color: #fff; }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="footer">
      DrMax Lékárna Hra ·
      <a href="https://github.com/HoisoviCZ/DrMax" target="_blank" rel="noopener">GitHub</a>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
